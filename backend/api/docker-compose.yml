services:
  postgres-db:
    restart: unless-stopped
    image: postgres:14-alpine3.18
    hostname: postgres-db
    volumes:
      - ./ps-data:/var/lib/postgresql/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "5432:5432"

  minio:
    image: minio/minio:RELEASE.2023-12-02T10-51-33Z-cpuv1
    container_name: minio
    command: server --console-address ":9001" /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:${MINIO_API_PORT}:9000" # Bind to localhost
      - "127.0.0.1:${MINIO_CONSOLE_PORT}:9001" # Bind to localhost
    volumes:
      - ./minio-data:/data
    networks:
      - traefik-public
      - default
    restart: unless-stopped

  order-api:
    build:
      context: .
      dockerfile: RestaurantOrder/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8080
    env_file:
      - .env
    depends_on:
      - postgres-db
