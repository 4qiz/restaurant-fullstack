services:
  admin-panel:
    build:
      context: ./admin-panel/app
      dockerfile: Dockerfile
      args:
        # build time variables
        DATABASE_URL: ${DATABASE_URL}
        MINIO_ENDPOINT: ${MINIO_ENDPOINT}
        MINIO_SSL: ${MINIO_SSL}
        NEXT_PUBLIC_ORDER_SERVICE_URL: ${NEXT_PUBLIC_ORDER_SERVICE_URL}
    container_name: admin-panel
    hostname: admin-panel
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    env_file:
      - path: .env
        required: true
    volumes:
      - ./photos:/app/public/photos
    networks:
      - backend-net
    ports:
      - 3000:3000

  restaurant-app:
    container_name: restaurant-app
    hostname: restaurant-app
    build:
      context: ./restaurant-app/restaurant
      dockerfile: Dockerfile
      args:
        # build time variables
        DATABASE_URL: ${DATABASE_URL}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_DADATA_TOKEN: ${NEXT_PUBLIC_DADATA_TOKEN}
        NEXT_PUBLIC_ORDER_SERVICE_URL: ${NEXT_PUBLIC_ORDER_SERVICE_URL}
    environment:
      - NODE_ENV=production
      - PORT=3001
    env_file:
      - path: .env
        required: true
    volumes:
      - ./photos:/restaurant/public/photos
    networks:
      - backend-net
    ports:
      - 3001:3001

  # nginx:
